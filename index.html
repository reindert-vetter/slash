<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PR Review Tree</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌳</text></svg>">
    <script>
      // Anti-flash: apply the persisted theme choice synchronously, before
      // Tailwind's CDN script even parses (let alone paints) — see
      // src/theme.mjs, which re-applies this reactively once the app module
      // loads and keeps 'system' live via a matchMedia listener. Duplicated
      // here (not imported) because ES modules load async and this must run
      // before the very first paint.
      ;(function () {
        var pref = 'system'
        try {
          var v = localStorage.getItem('theme')
          if (v === 'light' || v === 'dark' || v === 'system') pref = v
        } catch (e) {}
        var dark = pref === 'dark' || (pref === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
        var root = document.documentElement
        root.classList.toggle('dark', dark)
        root.setAttribute('data-theme', dark ? 'dark' : 'light')
      })()
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Manual dark/light toggle (src/theme.mjs, three-state: system/light/
      // dark) — 'selector' makes every dark: utility key off a `.dark` class
      // on <html> instead of prefers-color-scheme directly. See
      // .claude/rules/conventions.md ("Thema: systeem/licht/donker").
      tailwind.config = { darkMode: 'selector' }
    </script>
    <style>
      /* Keep programmatic scrolling (scrollIntoView for keyboard nav) but hide
         the scrollbar chrome — the panels read as clean floating blocks. */
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      /* Prism token colours only — scoped to every Prism code excerpt via the
         `.language-php` class it always carries (the diff panes in Block.mjs, the
         Onderliggende-code cards + comment hint in RelatedPanel.mjs, the footer),
         so all of them share one palette. We deliberately drop Prism's own
         container rules (padding/background/margins on pre|code[class*=language-])
         so they can't fight the Tailwind layout; only the syntax colours come from
         the vendored theme.

         Higher-contrast light palette (GitHub-light inspired): each category gets
         a clearly distinct, saturated hue so variables, keywords, functions,
         strings and numbers pull apart at a glance instead of blending into the
         muted default (magenta props ~= numbers, olive strings, brown operators). */
      .language-php .token.comment,
      .language-php .token.prolog,
      .language-php .token.doctype,
      .language-php .token.cdata {
        color: #6a737d; /* gray — recedes */
        font-style: italic;
      }
      .language-php .token.punctuation {
        color: #24292e; /* near-black, not washed-out gray */
      }
      .language-php .token.namespace {
        opacity: 0.7;
      }
      /* object properties / accessors & variables — their own steady orange, no
         longer the same magenta as numbers, so `->id`/`$order` read as one kind */
      .language-php .token.property,
      .language-php .token.variable,
      .language-php .token.regex,
      .language-php .token.tag,
      .language-php .token.symbol,
      .language-php .token.deleted {
        color: #e36209; /* orange */
      }
      .language-php .token.boolean,
      .language-php .token.number,
      .language-php .token.constant {
        color: #005cc5; /* blue */
      }
      .language-php .token.selector,
      .language-php .token.attr-name,
      .language-php .token.string,
      .language-php .token.char,
      .language-php .token.builtin,
      .language-php .token.inserted {
        color: #22863a; /* green */
      }
      .language-php .token.operator,
      .language-php .token.entity,
      .language-php .token.url,
      .language-php .token.atrule,
      .language-php .token.attr-value,
      .language-php .token.keyword {
        color: #d73a49; /* red — keywords & operators */
      }
      .language-php .token.function,
      .language-php .token.class-name {
        color: #6f42c1; /* purple — calls & types */
      }
      .language-php .token.important,
      .language-php .token.bold {
        font-weight: 700;
      }
      .language-php .token.italic {
        font-style: italic;
      }

      /* Minimal element styling for rendered Markdown (src/markdown.mjs),
         used for the PR-info column's summary/body/Jira-description
         (prInfoCard in home.mjs). Tailwind's Play CDN has no typography
         plugin without a build step, so this is a small hand-written set of
         rules scoped to `.markdown-body` — just enough for headings, lists,
         links, blockquotes, inline code and the Prism code-fence blocks it
         contains to read well; not a full prose reset. */
      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4,
      .markdown-body h5,
      .markdown-body h6 {
        margin-top: 0.75em;
        margin-bottom: 0.25em;
        font-weight: 600;
        color: #1e293b;
      }
      .markdown-body h1:first-child,
      .markdown-body h2:first-child,
      .markdown-body h3:first-child {
        margin-top: 0;
      }
      .markdown-body p {
        margin: 0.4em 0;
      }
      .markdown-body ul,
      .markdown-body ol {
        margin: 0.4em 0;
        padding-left: 1.4em;
      }
      .markdown-body ul {
        list-style: disc;
      }
      .markdown-body ol {
        list-style: decimal;
      }
      .markdown-body blockquote {
        margin: 0.4em 0;
        padding-left: 0.75em;
        border-left: 3px solid #cbd5e1;
        color: #64748b;
      }
      .markdown-body a {
        color: #4f46e5;
        text-decoration: underline;
      }
      .markdown-body code {
        background: #f1f5f9;
        border-radius: 0.25rem;
        padding: 0.05em 0.3em;
        font-size: 0.9em;
      }
      .markdown-body pre {
        margin: 0.5em 0;
        padding: 0.5em 0.6em;
        background: #f8fafc;
        border-radius: 0.375rem;
        overflow-x: auto;
      }
      .markdown-body pre code {
        background: none;
        padding: 0;
      }
      .markdown-body img {
        max-width: 100%;
        border-radius: 0.25rem;
      }
      .markdown-body hr {
        border: none;
        border-top: 1px solid #e2e8f0;
        margin: 0.6em 0;
      }

      /* Dark-mode overrides for the two colour blocks above. Tailwind's own
         utility classes handle their own dark: variants via the `.dark` class
         (see the tailwind.config script above); these two are plain CSS
         (Prism token colours + markdown-body element styling), so they can't
         key off that class and need their own selectors instead. Two
         equivalent blocks: `@media (prefers-color-scheme: dark)` covers the
         instant before src/theme.mjs has run (and a browser with JS
         disabled, following the OS setting only), `:root[data-theme="dark"]`
         is what actually applies once the reactive theme toggle overrides the
         OS default (systeem/licht/donker, see .claude/rules/conventions.md).
         Palette: Prism follows a GitHub-dark-inspired set (same
         category-per-hue mapping as the light palette above); markdown-body
         reuses the zinc/indigo dark palette used across the rest of the app. */
      @media (prefers-color-scheme: dark) {
        .language-php .token.comment,
        .language-php .token.prolog,
        .language-php .token.doctype,
        .language-php .token.cdata {
          color: #8b949e;
        }
        .language-php .token.punctuation {
          color: #c9d1d9;
        }
        .language-php .token.property,
        .language-php .token.variable,
        .language-php .token.regex,
        .language-php .token.tag,
        .language-php .token.symbol,
        .language-php .token.deleted {
          color: #ffa657;
        }
        .language-php .token.boolean,
        .language-php .token.number,
        .language-php .token.constant {
          color: #79c0ff;
        }
        .language-php .token.selector,
        .language-php .token.attr-name,
        .language-php .token.string,
        .language-php .token.char,
        .language-php .token.builtin,
        .language-php .token.inserted {
          color: #7ee787;
        }
        .language-php .token.operator,
        .language-php .token.entity,
        .language-php .token.url,
        .language-php .token.atrule,
        .language-php .token.attr-value,
        .language-php .token.keyword {
          color: #ff7b72;
        }
        .language-php .token.function,
        .language-php .token.class-name {
          color: #d2a8ff;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
          color: #e4e4e7;
        }
        .markdown-body blockquote {
          border-left-color: #3f3f46;
          color: #a1a1aa;
        }
        .markdown-body a {
          color: #818cf8;
        }
        .markdown-body code {
          background: #27272a;
        }
        .markdown-body pre {
          background: #18181b;
        }
        .markdown-body hr {
          border-top-color: #3f3f46;
        }
      }

      /* Same rules as the @media block above, mirrored for the manual theme
         toggle (src/theme.mjs sets data-theme on <html>) — see the comment
         above the @media block. */
      :root[data-theme='dark'] .language-php .token.comment,
      :root[data-theme='dark'] .language-php .token.prolog,
      :root[data-theme='dark'] .language-php .token.doctype,
      :root[data-theme='dark'] .language-php .token.cdata {
        color: #8b949e;
      }
      :root[data-theme='dark'] .language-php .token.punctuation {
        color: #c9d1d9;
      }
      :root[data-theme='dark'] .language-php .token.property,
      :root[data-theme='dark'] .language-php .token.variable,
      :root[data-theme='dark'] .language-php .token.regex,
      :root[data-theme='dark'] .language-php .token.tag,
      :root[data-theme='dark'] .language-php .token.symbol,
      :root[data-theme='dark'] .language-php .token.deleted {
        color: #ffa657;
      }
      :root[data-theme='dark'] .language-php .token.boolean,
      :root[data-theme='dark'] .language-php .token.number,
      :root[data-theme='dark'] .language-php .token.constant {
        color: #79c0ff;
      }
      :root[data-theme='dark'] .language-php .token.selector,
      :root[data-theme='dark'] .language-php .token.attr-name,
      :root[data-theme='dark'] .language-php .token.string,
      :root[data-theme='dark'] .language-php .token.char,
      :root[data-theme='dark'] .language-php .token.builtin,
      :root[data-theme='dark'] .language-php .token.inserted {
        color: #7ee787;
      }
      :root[data-theme='dark'] .language-php .token.operator,
      :root[data-theme='dark'] .language-php .token.entity,
      :root[data-theme='dark'] .language-php .token.url,
      :root[data-theme='dark'] .language-php .token.atrule,
      :root[data-theme='dark'] .language-php .token.attr-value,
      :root[data-theme='dark'] .language-php .token.keyword {
        color: #ff7b72;
      }
      :root[data-theme='dark'] .language-php .token.function,
      :root[data-theme='dark'] .language-php .token.class-name {
        color: #d2a8ff;
      }

      :root[data-theme='dark'] .markdown-body h1,
      :root[data-theme='dark'] .markdown-body h2,
      :root[data-theme='dark'] .markdown-body h3,
      :root[data-theme='dark'] .markdown-body h4,
      :root[data-theme='dark'] .markdown-body h5,
      :root[data-theme='dark'] .markdown-body h6 {
        color: #e4e4e7;
      }
      :root[data-theme='dark'] .markdown-body blockquote {
        border-left-color: #3f3f46;
        color: #a1a1aa;
      }
      :root[data-theme='dark'] .markdown-body a {
        color: #818cf8;
      }
      :root[data-theme='dark'] .markdown-body code {
        background: #27272a;
      }
      :root[data-theme='dark'] .markdown-body pre {
        background: #18181b;
      }
      :root[data-theme='dark'] .markdown-body hr {
        border-top-color: #3f3f46;
      }
    </style>
  </head>
  <body class="h-screen overflow-hidden bg-slate-50 text-slate-900 antialiased dark:bg-zinc-950 dark:text-zinc-100">
    <div id="app"></div>
    <!-- The footer strip (90px, reserved by the panels above) is mounted by
         home.mjs — see Footer.mjs. -->
    <script type="module" src="/src/home.mjs"></script>
  </body>
</html>
